name: Deploy Readiness

on:
  push:
  pull_request:

jobs:
  check-deploy-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deploy readiness checks
        run: npm run check:deploy
